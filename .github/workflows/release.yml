name: Release

on:
  push:
    tags:
      - "v*"
  # Allows creating releases for tags that existed before this workflow,
  # from the Actions tab via "Run workflow".
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to create a release for (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
