name: Release

on:
  push:
    tags:
      - "v*"
  # Allows creating releases for tags that existed before this workflow,
  # from the Actions tab via "Run workflow".
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to create a release for (for example v1.0.0)"
        required: true
        type: string

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create the GitHub release described by the tag message
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        # The description of the annotated tag becomes the release text,
        # prepended above the auto-generated changelog notes.
        run: |
          tag_object_sha=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.sha')
          tag_message=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha" --jq '.message' || echo "")
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "$tag_message" \
            --generate-notes \
            --verify-tag
